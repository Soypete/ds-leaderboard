# Receipt ingest — runs on PRs that add a receipt JSON to receipts/.
#
# This workflow belongs in the SUBMISSIONS repo (where players open PRs), not
# necessarily this app repo. It is committed here as the canonical reference;
# copy it into the submissions repo and set the two secrets below.
#
# Secrets required:
#   INGEST_URL            e.g. https://ds-leaderboard.vercel.app/api/ingest
#   INGEST_SHARED_SECRET  same value as the app's INGEST_SHARED_SECRET env var
#
# Anti-impersonation: the receipt's githubHandle MUST equal the PR author. The
# app re-checks this, but we reject early here with a helpful comment.

name: Ingest receipt

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'receipts/**.json'

permissions:
  contents: read
  pull-requests: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find changed receipt files
        id: files
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          changed=$(git diff --name-only --diff-filter=AM "$base" "$head" -- 'receipts/*.json' || true)
          echo "list<<EOF" >> "$GITHUB_OUTPUT"
          echo "$changed" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Validate author and POST each receipt
        if: steps.files.outputs.list != ''
        env:
          INGEST_URL: ${{ secrets.INGEST_URL }}
          INGEST_SHARED_SECRET: ${{ secrets.INGEST_SHARED_SECRET }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail
          author_lc=$(echo "$AUTHOR" | tr '[:upper:]' '[:lower:]')
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            handle=$(jq -r '.githubHandle' "$f" | tr '[:upper:]' '[:lower:]')
            if [ "$handle" != "$author_lc" ]; then
              echo "::error file=$f::receipt handle '$handle' does not match PR author '$author_lc'"
              exit 1
            fi
            payload=$(jq -nc --slurpfile r "$f" --arg author "$author_lc" --arg url "$PR_URL" \
              '{receipt: $r[0], author: $author, receiptUrl: $url}')
            code=$(curl -s -o /tmp/resp.json -w '%{http_code}' \
              -X POST "$INGEST_URL" \
              -H "Authorization: Bearer $INGEST_SHARED_SECRET" \
              -H 'Content-Type: application/json' \
              -d "$payload")
            echo "Ingest $f -> HTTP $code"
            cat /tmp/resp.json
            if [ "$code" != "201" ]; then
              echo "::error file=$f::ingest failed (HTTP $code)"
              exit 1
            fi
          done <<< "${{ steps.files.outputs.list }}"
