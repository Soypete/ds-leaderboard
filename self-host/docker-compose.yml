# Self-host kit — run the Dragonslayer leaderboard on your own infra.
#
# Three services: Postgres (the DB), MinIO (S3-compatible media storage, in place
# of Supabase Storage), and the Next.js app. This is for teams who need the
# boards on-prem instead of the hosted Supabase+Vercel deployment.
#
# Works with `docker compose` OR `podman compose` (the schema applies the same).
#
# Quick start:
#   1. cp .env.selfhost.example .env            # fill in secrets
#   2. docker compose up -d                      # (or: podman compose up -d)
#   3. the db service auto-applies supabase/migrations/*.sql on first boot
#   4. open http://localhost:3000
#
# NOTE: this runs raw Postgres + MinIO, NOT the full Supabase stack, so
# GitHub-OAuth/Supabase-Auth features (guild sign-in) need either a reachable
# Supabase Auth or the documented "one guild = whole instance, no auth" mode.
# The gold/trial boards + ingest + moderation work fully self-hosted.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-leaderboard}
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
      # Migrations run in filename order on first init (empty data dir only).
      - ../supabase/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 10

  # S3-compatible object storage for media (screenshots/videos).
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 10

  # Creates the media bucket once MinIO is up.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb -p local/${MEDIA_BUCKET:-ds-media} &&
      mc anonymous set download local/${MEDIA_BUCKET:-ds-media} &&
      echo 'bucket ready';
      "

  app:
    build:
      context: ..
      dockerfile: self-host/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Point the app's DB + storage at the local services. The app's Supabase
      # client variables map onto these in self-host mode.
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-leaderboard}
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET:?set a secret}
      MODERATOR_HANDLES: ${MODERATOR_HANDLES:-}
      SELF_HOST: 'true'
      # MinIO (S3) — the storage layer uses these in self-host mode.
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MEDIA_BUCKET: ${MEDIA_BUCKET:-ds-media}
    ports:
      - '3000:3000'

volumes:
  db_data:
  minio_data:
